  utter_slots_values:
    - text: |-
        Chẩn đoán: bệnh {benh}
        Độ tương đồng: {s}% 
      buttons:
        - title: "Thông tin"
          payload: /thong_tin{{"benh_tieu_hoa":"{benh}"}}

forms:
  chan_doan_benh_form:
    required_slots:
      - xuat_huyet_da_day
      - roi_loan_tieu_hoa
      - dau_dau
      - non_ra_mau
      - nong_rat_da_day
      - dau_nhoi_xuong_suon
      - dau_quanh_ron
      - dau_tuc_nguc
      - viem_hong
      - mieng_tiet_nhieu_nuoc_bot
      - sa_bui_tri
      - mot_ran
      - xung_quanh_hau_mon
      - dau_vung_hau_mon
      - chan_tay_lanh_da_kho_mat_trung
      - tieu_chay
      - da_san_sui_tho_rap
      - dai_tien_it
      - phan_cung
      - dau_khi_di_dai_tien
      - sot
      - dau_ben_trai_bung_duoi
      - an_uong_kem
      - phan_dinh_mau
      - dau_vung_thuong_vi
      - tieu_chay_dai_tien_it_phan_cung
      - mat_ngu
      - buon_non
      - met_moi_suy_nhuoc
      - o_hoi_o_chua

entities:
