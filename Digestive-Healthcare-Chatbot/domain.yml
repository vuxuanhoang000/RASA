      buttons:
        - title: "Có"
          payload: "có"
        - title: "Không"
          payload: "không"
  utter_ask_tieu_chay_dai_tien_it_phan_cung:
    - text: "Bạn có bị tiêu chảy hay đại tiện ít, phân cứng không?"
      buttons:
        - title: "Có"
          payload: "có"
        - title: "Không"
          payload: "không"
  utter_ask_mat_ngu:
