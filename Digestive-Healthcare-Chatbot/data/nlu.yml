version: "3.1"

nlu:
- intent: greet
  examples: |
    - hi
    - xin chào
    - chào bạn
    - chào bot
    - bắt đầu

- intent: goodbye
  examples: |
    - bye
    - bye bye
    - cảm ơn bạn
    - cảm ơn bạn, chào bạn nhé
    - chào bot nhé
    - chào bạn nhé
    - hẹn gặp lại
    - tôi đi đây

- intent: bot_challenge
  examples: |
    - bạn là ai
    - tôi đang nói chuyện với ai vậy
    - hãy cho tôi biết bạn là ai
    - đây là đâu
    - đây là gì
    - bạn là gì
    - ai đang nói chuyện đấy
    - ai ở đầu bên kia đấy

